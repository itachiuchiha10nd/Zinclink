<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinc Links 🌸</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌸 smooth scroll */
html{
scroll-behavior:smooth;
}

/* 🎥 video background */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* soft pink overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,200,230,0.25);
z-index:-1;
}

/* body */
body{
font-family:'Segoe UI',sans-serif;
overflow-x:hidden;
overflow-y:auto;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
z-index:999;
}

/* title */
h1{
text-align:center;
margin-top:20px;
color:#ff4da6;
position:relative;
z-index:2;
}

/* container */
.container{
position:relative;
z-index:2;
padding:60px 20px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
max-width:400px;
margin:auto;
}

/* button */
.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:#000;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
transition:.3s;
}

.link-button:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.9);
}

/* 🌸 falling sakura */
.flower{
position:fixed;
top:-20px;
font-size:20px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) translateX(0);}
100%{transform:translateY(110vh) translateX(40px) rotate(360deg);}
}

/* 💥 petal blast */
.burst{
position:fixed;
font-size:20px;
pointer-events:none;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
0%{
opacity:1;
transform:translate(0,0) scale(1);
}
100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(0.5);
}
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video class="bg-video" autoplay muted loop playsinline>
<source src="assets/cherry-bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<a href="index.html" class="back">⬅ Back</a>

<h1>🌸 Zinc Links 🌸</h1>

<div class="container">

<div class="links">

<a href="https://t.me/+TR9htFRxo5wzZDFl" class="link-button">📡 Main Channel</a>
<a href="https://t.me/+vXfnGFII1zk3YjI1" class="link-button">🐺 Ph Wolf Blood</a>
<a href="https://t.me/piratepotatoe" class="link-button">🎮 Ludum Nexus</a>
<a href="https://t.me/+vl5nFkI2FdYwNDNl" class="link-button">📜 Zinchronicles</a>
<a href="https://t.me/Zinisters" class="link-button">🌙 Nightmares</a>
<a href="https://t.me/Zinclinck" class="link-button">🔗 Zinclink</a>
<a href="https://t.me/Menolostalgia" class="link-button">🎵 Dump Playlist</a>
<a href="https://t.me/Matthew1128NIV" class="link-button">📖 God's Words</a>
<a href="https://t.me/Formeforusforyou" class="link-button">🙏 Worship Song</a>
<a href="https://padlet.com/serialollipoop/freedom-wall-fqxswoovty9lok4s" class="link-button">💭 Freedom Wall</a>

</div>

</div>

<script>

/* 🌸 falling sakura */
for(let i=0;i<35;i++){
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(5+Math.random()*5)+"s";
f.style.opacity=Math.random();
document.body.appendChild(f);
}

/* 💥 click petal blast */
document.addEventListener("click",(e)=>{
for(let i=0;i<15;i++){

let p=document.createElement("div");
p.className="burst";
p.innerHTML="🌸";

let x=(Math.random()*300-150)+"px";
let y=(Math.random()*300-150)+"px";

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);
}
});

</script>

</body>
</html>
