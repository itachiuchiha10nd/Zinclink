<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* theme */
:root{
--bg:#a8d8ea;
--text:#2c3e50;
--card:rgba(255,255,255,0.3);
}

body.dark{
--bg:#0d1025;
--text:#fff;
--card:rgba(255,255,255,0.1);
}

body{
background:var(--bg);
color:var(--text);
font-family:'Quicksand',sans-serif;
overflow:hidden;
}

/* canvas */
canvas{position:fixed;top:0;left:0;z-index:0}

/* container */
.container{
position:relative;
z-index:1;
text-align:center;
padding:20px;
}

/* profile */
.profile img{
width:120px;height:120px;border-radius:50%;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:var(--text);
background:var(--card);
}

/* controls */
.controls-left{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:999;
}

.controls-right{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:999;
}

.control-btn{
width:45px;height:45px;
border-radius:50%;
border:none;
cursor:pointer;
}

/* buttons */
.sticker-btn{
width:130px;height:45px;
border-radius:12px;
background:#111;color:#fff;
}

.birthday-btn{
width:60px;height:45px;
border-radius:12px;
background:#ff4d6d;color:#fff;
}

/* frieren */
.frieren-character{
position:fixed;
width:140px;
pointer-events:auto;
z-index:2;
}

.frieren-character img{
width:100%;
}

/* sticker page */
.page{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:linear-gradient(#87CEEB,#e0f7ff);
display:none;
z-index:9999;
overflow:hidden;
padding:20px;
text-align:center;
}

.page .links{position:relative;z-index:2}

.back{
position:fixed;
top:10px;
left:10px;
}

/* clouds */
.cloud{
position:absolute;
background:white;
border-radius:50%;
opacity:.8;
animation:cloudMove linear infinite;
}

.cloud1{width:120px;height:60px;top:20%;animation-duration:40s;}
.cloud2{width:100px;height:50px;top:50%;animation-duration:30s;}
.cloud3{width:140px;height:70px;top:70%;animation-duration:50s;}

@keyframes cloudMove{
0%{left:-200px;}
100%{left:110%;}
}

/* birds */
.bird{
position:absolute;
font-size:20px;
animation:fly 10s linear infinite;
}

@keyframes fly{
0%{left:-50px;top:20%;}
100%{left:110%;top:25%;}
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
<source src="assets/music.mp3">

<script>
// theme
document.getElementById('themeToggle').onclick=()=>{
document.body.classList.toggle('dark');
};

// music
const music=document.getElementById('bgMusic');
let playing=false;
document.getElementById('musicToggle').onclick=()=>{
playing?music.pause():music.play();
playing=!playing;
};

// frieren FIXED
const gifs=["assets/frieren1.gif","assets/frieren2.gif","assets/frieren3.gif"];
const frierens=[];
let active=null;

gifs.forEach(src=>{
let f=document.createElement("img");
f.src=src;
f.className="frieren-character";
document.body.appendChild(f);

f.style.left=Math.random()*80+"vw";
f.style.top=Math.random()*70+"vh";

f.onclick=()=>active=f;

frierens.push(f);
});

document.addEventListener("mousemove",(e)=>{
if(active){
active.style.left=(e.clientX-70)+"px";
active.style.top=(e.clientY-70)+"px";
}
});

setInterval(()=>{
frierens.forEach(f=>{
if(f!==active){
f.style.left=Math.random()*90+"vw";
f.style.top=Math.random()*90+"vh";
f.style.transition="2s linear";
}
});
},2000);

// sky
const c=document.getElementById('sky');
const ctx=c.getContext('2d');
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// sticker
function openStickers(){
document.getElementById("stickerPage").style.display="block";
}
function closeStickers(){
document.getElementById("stickerPage").style.display="none";
}

// birthday
function openBirthday(){
window.location.href="birthday.html";
}
</script>
