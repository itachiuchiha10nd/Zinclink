<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinclink ✨</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌞 Light */
:root{
--bg:#a8d8ea;
--text:#2c3e50;
--card:rgba(255,255,255,0.3);
}

/* 🌙 Dark */
body.dark{
--bg:#0d1025;
--text:#ffffff;
--card:rgba(255,255,255,0.1);
}

body{
background:var(--bg);
color:var(--text);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
transition:.4s;
}

/* canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* container */
.container{
position:relative;
z-index:1;
text-align:center;
padding:20px;
}

/* profile */
.profile img{
width:120px;
height:120px;
border-radius:50%;
}

h1{margin-top:10px}

/* buttons */
.buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{
padding:15px;
border-radius:18px;
text-decoration:none;
color:var(--text);
background:var(--card);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* controls */
.controls{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:999;
}

.control-btn{
width:45px;height:45px;
border:none;border-radius:10px;
cursor:pointer;
}

/* frieren */
.frieren-character{
position:absolute;
width:90px;
cursor:pointer;
}
.frieren-character img{
width:100%;
animation:float 3s infinite;
}
@keyframes float{
50%{transform:translateY(-10px)}
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="controls">
<button class="control-btn" id="themeToggle">🌙</button>
<button class="control-btn" id="musicToggle">🎵</button>
</div>

<div class="container">

<div class="profile">
<img src="assets/profile.jpg">
<h1>✨ ZINCLINK ✨</h1>
</div>

<div class="buttons">
<a href="stickers.html" class="btn">🍭 ZINC STICKER</a>
<a href="birthday.html" class="btn">🎂 BIRTHDAY WALL</a>
<a href="links.html" class="btn">🔗 ZINC LINKS💗</a>
</div>

</div>

<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<script>
// 🌙 theme
const body=document.body;
const themeBtn=document.getElementById('themeToggle');

themeBtn.onclick=()=>{
body.classList.toggle('dark');
};

// 🎵 music
const music=document.getElementById('bgMusic');
let playing=false;
document.getElementById('musicToggle').onclick=()=>{
if(!playing){music.play();playing=true;}
else{music.pause();playing=false;}
};

// 🌌 sky
const canvas=document.getElementById('sky');
const ctx=canvas.getContext('2d');
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// 🧝 frieren
["assets/frieren1.gif","assets/frieren2.gif","assets/frieren3.gif"].forEach(src=>{
let f=document.createElement("div");
f.className="frieren-character";
let img=document.createElement("img");
img.src=src;
f.appendChild(img);
document.body.appendChild(f);

f.style.left=Math.random()*80+"vw";
f.style.top=Math.random()*70+"vh";

f.onclick=()=>{music.play()};
});
</script>

</body>
</html>
