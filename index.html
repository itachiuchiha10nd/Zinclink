<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZINCLINK ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#1a1f3a,#3b1f5c);
color:white;
text-align:center;
overflow-x:hidden;
}

/* Profile */
.profile img{
width:120px;height:120px;border-radius:50%;
margin-top:40px;
border:3px solid rgba(255,255,255,0.5);
box-shadow:0 0 20px rgba(255,255,255,0.3);
}

h1{
font-family:'Cinzel',serif;
margin-top:15px;
}

.profile-bio{
opacity:.8;
margin-bottom:30px;
}

/* Links */
.links{
display:flex;
flex-direction:column;
gap:14px;
padding:0 20px;
}

.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:white;
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
transition:.3s;
}

.link-button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* Controls */
.controls{
position:fixed;
top:15px;
right:15px;
z-index:10;
}

.control-btn{
padding:10px;
border:none;
border-radius:50%;
cursor:pointer;
}

/* Frieren */
.frieren-character{
position:fixed;
bottom:20px;
left:-120px;
width:110px;
z-index:10;
cursor:pointer;
animation:move 18s linear infinite;
}

.frieren-character img{
width:100%;
animation:float 3s ease-in-out infinite, blink 4s infinite;
}

@keyframes move{
0%{left:-120px}
50%{left:calc(100% - 110px)}
100%{left:-120px}
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

@keyframes blink{
0%,92%,100%{opacity:1}
95%{opacity:0.3}
}
</style>
</head>

<body>

<div class="controls">
<button id="musicToggle">🎵</button>
</div>

<div class="profile">
<img src="assets/profile.jpg">
<h1>ZINCLINK</h1>
<p class="profile-bio">Beyond the journey's end ✨</p>
</div>

<div class="links">
<a href="https://t.me/+TR9htFRxo5wzZDFl" class="link-button">📡 Main Channel</a>
<a href="https://t.me/+vXfnGFII1zk3YjI1" class="link-button">🐺 Ph Wolf blood</a>
<a href="https://t.me/piratepotatoe" class="link-button">🎮 Ludum Nexus</a>
<a href="https://t.me/+vl5nFkI2FdYwNDNl" class="link-button">📜 Zinchronicles</a>
<a href="https://t.me/Zinisters" class="link-button">🌙 Nightmares</a>
<a href="https://t.me/Zinclinck" class="link-button">🔗 Zinclink</a>
<a href="https://t.me/Menolostalgia" class="link-button">🎵 Dump playlist</a>
<a href="https://t.me/Matthew1128NIV" class="link-button">📖 God's Words</a>
<a href="https://t.me/Formeforusforyou" class="link-button">🙏 Worship song</a>
<a href="https://padlet.com/serialollipoop/freedom-wall-fqxswoovty9lok4s" class="link-button">💭 Freedom Wall</a>
</div>

<div class="frieren-character" id="frierenChar">
<img src="assets/frieren.png">
</div>

<audio id="bgMusic" loop preload="auto">
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 Music system (mobile fix)
const music = document.getElementById('bgMusic');
const btn = document.getElementById('musicToggle');
let playing = false;

// unlock mobile autoplay
document.addEventListener('click', () => {
    music.play().then(()=>music.pause()).catch(()=>{});
}, { once:true });

btn.onclick = () => {
    if(!playing){
        music.play();
        btn.textContent='🔊';
        playing=true;
    } else {
        music.pause();
        btn.textContent='🎵';
        playing=false;
    }
};

// 🧝 Jump effect
const frieren = document.getElementById('frierenChar');

frieren.addEventListener('click', () => {
    frieren.style.transform = 'translateY(-60px) scale(1.05)';
    setTimeout(() => {
        frieren.style.transform = 'translateY(0)';
    }, 500);
});
</script>

</body>
</html>
