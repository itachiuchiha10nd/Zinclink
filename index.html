<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinclink ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌞 Light */
:root{
--bg:#a8d8ea;
--text:#2c3e50;
--card:rgba(255,255,255,0.3);
}

/* 🌙 Dark */
body.dark{
--bg:#0d1025;
--text:#ffffff;
--card:rgba(255,255,255,0.1);
}

body{
background:var(--bg);
color:var(--text);
font-family:'Quicksand',sans-serif;
overflow:hidden;
transition:0.4s;
}

/* canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* container */
.container{
position:relative;
z-index:1;
text-align:center;
padding:20px;
}

/* profile */
.profile img{
width:120px;height:120px;border-radius:50%;
}

h1{
font-family:'Cinzel';
margin-top:10px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:var(--text);
background:var(--card);
transition:.3s;
}

.link-button:hover{
transform:scale(1.05);
}

/* controls */
.controls{
position:fixed;
top:10px;
right:10px;
z-index:999;
display:flex;
gap:10px;
}

.control-btn{
width:45px;height:45px;
border:none;border-radius:50%;
cursor:pointer;
font-size:18px;
}

/* frieren */
.frieren-character{
position:absolute;
width:100px;
cursor:pointer;
}
    
.frieren-character video{
    width:100%;
    pointer-events:none;
    mix-blend-mode: screen;
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="controls">
<button class="control-btn" id="themeToggle">🌙</button>
<button class="control-btn" id="musicToggle">🎵</button>
</div>

<div class="container">

<div class="profile">
<img src="assets/profile.jpg">
<h1>✨ ZINCLINK ✨</h1>
</div>

<div class="links">
<a href="https://t.me/+TR9htFRxo5wzZDFl" class="link-button">📡 Main Channel</a>
<a href="https://t.me/+vXfnGFII1zk3YjI1" class="link-button">🐺 Ph Wolf blood</a>
<a href="https://t.me/piratepotatoe" class="link-button">🎮 Ludum Nexus</a>
<a href="https://t.me/+vl5nFkI2FdYwNDNl" class="link-button">📜 Zinchronicles</a>
<a href="https://t.me/Zinisters" class="link-button">🌙 Nightmares</a>
<a href="https://t.me/Zinclinck" class="link-button">🔗 Zinclink</a>
<a href="https://t.me/Menolostalgia" class="link-button">🎵 Dump playlist</a>
<a href="https://t.me/Matthew1128NIV" class="link-button">📖 God's Words</a>
<a href="https://t.me/Formeforusforyou" class="link-button">🙏 Worship song</a>
<a href="https://padlet.com/serialollipoop/freedom-wall-fqxswoovty9lok4s" class="link-button">💭 Freedom Wall</a>
</div>

</div>

<audio id="bgMusic" loop preload="auto">
<source src="assets/music.mp3" type="audio/mpeg">
</audio>

<script>
// 🌙 Theme
const body=document.body;
const themeBtn=document.getElementById('themeToggle');

if(localStorage.getItem('theme')==='dark'){
body.classList.add('dark');
themeBtn.textContent='☀️';
}

themeBtn.onclick=()=>{
body.classList.toggle('dark');
const dark=body.classList.contains('dark');
themeBtn.textContent=dark?'☀️':'🌙';
localStorage.setItem('theme',dark?'dark':'light');
};

// 🎵 Music
const music=document.getElementById('bgMusic');
const musicBtn=document.getElementById('musicToggle');
let playing=false;

document.addEventListener('click',()=>{
music.play().then(()=>music.pause()).catch(()=>{});
},{once:true});

musicBtn.onclick=()=>{
if(!playing){
music.play();
musicBtn.textContent='🔊';
playing=true;
}else{
music.pause();
musicBtn.textContent='🎵';
playing=false;
}
};

// 🧝 MP4 Frieren SYSTEM
const videos = [
"assets/frieren1.mp4",
"assets/frieren2.mp4",
"assets/frieren3.mp4"
];

const frierens = [];
let activeFollower = null;

videos.forEach(src=>{
    const f = document.createElement("div");
    f.className = "frieren-character";

    const video = document.createElement("video");
    video.src = src;
    video.autoplay = true;
    video.loop = true;
    video.muted = true;
    video.playsInline = true;

    f.appendChild(video);
    document.body.appendChild(f);

    f.style.left = Math.random()*80 + "vw";
    f.style.top = Math.random()*70 + "vh";

    frierens.push(f);

    // click → follow
    f.onclick = ()=>{
        activeFollower = f;

        f.style.transform="translateY(-50px) scale(1.05)";
        music.currentTime=0;
        music.play();

        setTimeout(()=>f.style.transform="none",400);
    };
});

// mouse follow
document.addEventListener("mousemove",(e)=>{
    if(activeFollower){
        activeFollower.style.left = (e.clientX - 80) + "px";
        activeFollower.style.top = (e.clientY - 80) + "px";
        activeFollower.style.transition="0.2s linear";
    }
});

// random movement
setInterval(()=>{
    frierens.forEach(f=>{
        if(f !== activeFollower){
            f.style.left = Math.random()*90 + "vw";
            f.style.top = Math.random()*90 + "vh";
            f.style.transition="2s linear";
        }
    });
},2000);

// 🌌 SKY
const canvas=document.getElementById('sky');
const ctx=canvas.getContext('2d');

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<100;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

// 🎮 mouse trail
document.addEventListener('mousemove',(e)=>{
let dot=document.createElement('div');
dot.style.position='fixed';
dot.style.left=e.clientX+'px';
dot.style.top=e.clientY+'px';
dot.style.width='5px';
dot.style.height='5px';
dot.style.background='white';
dot.style.borderRadius='50%';
dot.style.zIndex='999';
document.body.appendChild(dot);

setTimeout(()=>dot.remove(),400);
});
</script>

</body>
</html>
