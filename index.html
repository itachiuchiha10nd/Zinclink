<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinclink ✨</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌞 Light */
:root{
--bg:#a8d8ea;
--text:#2c3e50;
--card:rgba(255,255,255,0.3);
}

/* 🌙 Dark */
body.dark{
--bg:#0d1025;
--text:#fff;
--card:rgba(255,255,255,0.1);
}

body{
background:var(--bg);
color:var(--text);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
transition:.4s;
}

/* canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* container */
.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

/* profile */
.profile img{
width:120px;
height:120px;
border-radius:50%;
}

/* buttons */
.buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{
padding:15px;
border-radius:18px;
text-decoration:none;
color:var(--text);
background:var(--card);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* controls */
.controls{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:10;
}

.control-btn{
width:45px;height:45px;
border:none;border-radius:10px;
cursor:pointer;
}

/* frieren */
.frieren-character{
position:absolute;
width:80px;
z-index:5;
cursor:pointer;
}

.frieren-character img{
width:100%;
pointer-events:none;
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<div class="controls">
<button class="control-btn" id="themeToggle">🌙</button>
<button class="control-btn" id="musicToggle">🎵</button>
</div>

<div class="container">
<div class="profile">
<img src="assets/profile.jpg">
<h1>✨ ZINCLINK ✨</h1>
</div>

<div class="buttons">
<a href="stickers.html" class="btn">🍭 ZINC STICKER</a>
<a href="birthday.html" class="btn">🎂 BIRTHDAY WISHES 2025 </a>
<a href="links.html" class="btn">🔗 ALL LINKS</a>
</div>
</div>

<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<script>

/* 🌙 THEME */
const body=document.body;
document.getElementById("themeToggle").onclick=()=>{
body.classList.toggle("dark");
};

/* 🎵 MUSIC */
const music=document.getElementById("bgMusic");
let playing=false;
document.getElementById("musicToggle").onclick=()=>{
if(!playing){music.play();playing=true;}
else{music.pause();playing=false;}
};

/* 🌌 STAR BLINK */
const canvas=document.getElementById('sky');
const ctx=canvas.getContext('2d');

canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
o:Math.random()
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
s.o += (Math.random()-0.5)*0.05;
if(s.o<0)s.o=0;
if(s.o>1)s.o=1;

ctx.fillStyle=`rgba(255,255,255,${s.o})`;
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(draw);
}
draw();

/* 🧝 FRIEREN SYSTEM */
const gifs=[
"assets/frieren1.gif",
"assets/frieren2.gif",
"assets/frieren3.gif"
];

const frierens=[];
let active=null;

gifs.forEach(src=>{
let f=document.createElement("div");
f.className="frieren-character";

let img=document.createElement("img");
img.src=src;

f.appendChild(img);
document.body.appendChild(f);

/* start pos */
f.style.left=Math.random()*80+"vw";
f.style.top=Math.random()*70+"vh";

frierens.push(f);

/* click follow */
f.onclick=()=>{
active=f;

/* jump */
f.style.transform="translateY(-40px)";
setTimeout(()=>f.style.transform="none",400);

music.currentTime=0;
music.play();
};
});

/* follow */
document.addEventListener("mousemove",(e)=>{
if(active){
active.style.left=(e.clientX-70)+"px";
active.style.top=(e.clientY-70)+"px";
active.style.transition="0.2s linear";
}
});

/* random move */
setInterval(()=>{
frierens.forEach(f=>{
if(f!==active){
f.style.left=Math.random()*90+"vw";
f.style.top=Math.random()*90+"vh";
f.style.transition="2s linear";
}
});
},2000);

</script>

</body>
</html>
