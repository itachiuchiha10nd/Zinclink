<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinclink ✨</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌞 Light */
:root{
--text:#2c3e50;
--card:rgba(255,255,255,0.4);
}

/* 🌙 Dark */
body.dark{
--text:#ffffff;
--card:rgba(0,0,0,0.4);
}

body{
color:var(--text);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

/* 🎥 VIDEO RESPONSIVE */
.bg-video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
object-position:center;
z-index:-2;
pointer-events:none;
transition:0.5s;
}

/* fix mobile scaling */
video{
max-width:none;
}

/* orientation fix */
@media (orientation: portrait){
.bg-video{object-position:center top;}
}
@media (orientation: landscape){
.bg-video{object-position:center;}
}

/* canvas */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* container */
.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

/* profile */
.profile img{
width:120px;
height:120px;
border-radius:50%;
}

/* buttons */
.buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:20px;
}

.btn{
padding:15px;
border-radius:18px;
text-decoration:none;
color:var(--text);
background:var(--card);
backdrop-filter:blur(10px);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* controls */
.controls{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:10;
}

.control-btn{
width:45px;height:45px;
border:none;border-radius:10px;
cursor:pointer;
}

/* frieren */
.frieren-character{
position:absolute;
width:80px;
z-index:5;
cursor:pointer;
}

.frieren-character img{
width:100%;
pointer-events:none;
animation:float 3s infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<!-- 🌞 DAY VIDEO -->
<video id="dayVideo" class="bg-video" autoplay muted loop playsinline>
<source src="assets/day.mp4" type="video/mp4">
</video>

<!-- 🌙 NIGHT VIDEO -->
<video id="nightVideo" class="bg-video" autoplay muted loop playsinline style="display:none;">
<source src="assets/night.mp4" type="video/mp4">
</video>

<canvas id="sky"></canvas>

<div class="controls">
<button class="control-btn" id="themeToggle">🌙</button>
<button class="control-btn" id="musicToggle">🎵</button>
</div>

<div class="container">

<div class="profile">
<img src="assets/profile.jpg">
<h1>✨ ZINCLINK ✨</h1>
</div>

<div class="buttons">
<a href="stickers.html" class="btn">🍭 ZINC STICKER</a>
<a href="birthday.html" class="btn">🎂 BIRTHDAY WISHES 2025</a>
<a href="links.html" class="btn">🔗 ALL LINKS</a>

</div>

</div>

<audio id="bgMusic" loop>
<source src="assets/music.mp3">
</audio>

<script>

/* 🌙 THEME + VIDEO SWITCH */
const body=document.body;
const btn=document.getElementById("themeToggle");

const dayVideo=document.getElementById("dayVideo");
const nightVideo=document.getElementById("nightVideo");

/* load saved */
if(localStorage.getItem("theme")==="dark"){
body.classList.add("dark");
dayVideo.style.display="none";
nightVideo.style.display="block";
btn.textContent="☀️";
}

/* toggle */
btn.onclick=()=>{
body.classList.toggle("dark");
let dark=body.classList.contains("dark");

if(dark){
dayVideo.style.display="none";
nightVideo.style.display="block";
btn.textContent="☀️";
}else{
dayVideo.style.display="block";
nightVideo.style.display="none";
btn.textContent="🌙";
}

localStorage.setItem("theme",dark?"dark":"light");
};

/* 🎵 MUSIC */
const music=document.getElementById("bgMusic");
let playing=false;

document.getElementById("musicToggle").onclick=()=>{
if(!playing){music.play();playing=true;}
else{music.pause();playing=false;}
};

/* 🌌 STARS (night only) */
const canvas=document.getElementById('sky');
const ctx=canvas.getContext('2d');

function resizeCanvas(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
o:Math.random()
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(body.classList.contains("dark")){
stars.forEach(s=>{
s.o+=(Math.random()-0.5)*0.05;
if(s.o<0)s.o=0;
if(s.o>1)s.o=1;

ctx.fillStyle=`rgba(255,255,255,${s.o})`;
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});
}

requestAnimationFrame(draw);
}
draw();

/* 🧝 FRIEREN */
const gifs=[
"assets/frieren1.gif",
"assets/frieren2.gif",
"assets/frieren3.gif"
];

const frierens=[];
let active=null;

gifs.forEach(src=>{
let f=document.createElement("div");
f.className="frieren-character";

let img=document.createElement("img");
img.src=src;

f.appendChild(img);
document.body.appendChild(f);

f.style.left=Math.random()*80+"vw";
f.style.top=Math.random()*70+"vh";

frierens.push(f);

f.onclick=()=>{
active=f;
f.style.transform="translateY(-40px)";
setTimeout(()=>f.style.transform="none",400);
music.currentTime=0;
music.play();
};
});

/* follow */
document.addEventListener("mousemove",(e)=>{
if(active){
active.style.left=(e.clientX-70)+"px";
active.style.top=(e.clientY-70)+"px";
active.style.transition="0.2s linear";
}
});

/* random move */
setInterval(()=>{
frierens.forEach(f=>{
if(f!==active){
f.style.left=Math.random()*90+"vw";
f.style.top=Math.random()*90+"vh";
f.style.transition="2s linear";
}
});
},2000);

</script>

</body>
</html>
