<title>Birthday Wall 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
overflow-y:auto;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#fff;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
font-weight:bold;
}

/* title */
h1{
text-align:center;
color:#fff;
margin-bottom:20px;
}

/* layout */
.wall{
display:flex;
flex-direction:column;
gap:15px;
}

/* cards */
.card{
width:80%;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
white-space:pre-line;
}

/* zig-zag */
.left{align-self:flex-start;}
.right{align-self:flex-end;}

</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>
