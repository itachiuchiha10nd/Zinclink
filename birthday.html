<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wall 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🌸 LIGHT BACKGROUND */
body{
font-family:'Segoe UI',sans-serif;
background:
linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)),
url("assets/birthday-bg.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
padding:20px;
color:#000;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
z-index:1000;
}

/* title */
h1{
text-align:center;
margin-bottom:20px;
}

/* masonry */
.wall{
column-count:2;
column-gap:15px;
}

@media(max-width:700px){
.wall{column-count:1;}
}

/* cards */
.card{
display:inline-block;
width:100%;
margin-bottom:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
white-space:pre-line;
break-inside:avoid;

/* glass */
background:rgba(255,255,255,0.75);
backdrop-filter:blur(10px);

transition:.3s;
}

.card:hover{
transform:scale(1.02);
}

/* image */
.card img{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1>🎂 Birthday Wall 🎂</h1>

<div class="wall" id="wall"></div>

<!-- wishes -->
<script src="./wishes.js?v=3"></script>

<script>
window.onload = function(){

const wall = document.getElementById("wall");

/* safety */
if(typeof wishes === "undefined"){
wall.innerHTML = "<h2 style='color:red;text-align:center'>❌ wishes.js not loaded</h2>";
return;
}

/* render */
wishes.forEach(w=>{
wall.innerHTML += `
<div class="card" style="background:${w.color || 'rgba(255,255,255,0.75)'}">
<h3>${w.title || "Birthday Wish 🎂"}</h3>
<p>${w.msg || ""}</p>
${w.img ? `<img src="${w.img}">` : ""}
</div>
`;
});

};
</script>

</body>
</html>
