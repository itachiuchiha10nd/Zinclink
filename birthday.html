<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wall 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
overflow-y:auto;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#fff;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
font-weight:bold;
z-index:1000;
}

/* title */
h1{
text-align:center;
color:#fff;
margin-bottom:20px;
}

/* grid layout */
.wall{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

/* mobile fix */
@media(max-width:700px){
.wall{
grid-template-columns:1fr;
}
}

/* card */
.card{
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
white-space:pre-line;
transition:.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1>🎂 Birthday Wall 🎂</h1>

<div class="wall" id="wall"></div>

<!-- LOAD WISHES -->
<script src="wishes.js"></script>

<script>
const wall=document.getElementById("wall");

/* render */
wishes.forEach(w=>{
wall.innerHTML+=`
<div class="card" style="background:${w.color}">
<h3>${w.title || "Birthday Wish 🎂"}</h3>
<p>${w.msg}</p>
${w.img ? `<img src="${w.img}">` : ""}
</div>
`;
});
</script>

</body>
</html>
