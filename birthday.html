here<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wall 🎂</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* body */
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
padding:20px;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
font-weight:bold;
z-index:1000;
}

/* title */
h1{
text-align:center;
color:#fff;
margin-bottom:20px;
}

/* masonry */
.wall{
column-count:2;
column-gap:15px;
}

@media(max-width:700px){
.wall{column-count:1;}
}

/* card */
.card{
display:inline-block;
width:100%;
margin-bottom:15px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
white-space:pre-line;
break-inside:avoid;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
transition:.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
margin-top:10px;
border-radius:10px;
}

.error{
color:red;
text-align:center;
margin-top:20px;
}
</style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1>🎂 Birthday Wall 🎂</h1>

<div class="wall" id="wall"></div>

<!-- LOAD WISHES -->
<script src="wishes.js?v=NUMBER"></script>

<script>
const wall = document.getElementById("wall");

try{

if(typeof wishes === "undefined"){
throw new Error("wishes.js not loaded ❌");
}

if(wishes.length === 0){
throw new Error("No wishes found ❌");
}

/* render safely */
wishes.forEach(w=>{
if(!w) return;

wall.innerHTML += `
<div class="card" style="background:${w.color || '#fff'}">
<h3>${w.title || "Birthday Wish 🎂"}</h3>
<p>${w.msg || ""}</p>
${w.img ? `<img src="${w.img}">` : ""}
</div>
`;
});

console.log("✅ Wishes loaded:", wishes.length);

}catch(err){

wall.innerHTML = `
<div class="error">
❌ Error loading wishes<br><br>
${err.message}
</div>
`;

console.error(err);
}
</script>

</body>
</html>
