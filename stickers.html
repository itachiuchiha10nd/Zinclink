<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Zinc Stickers 🍭</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* 🎥 video background */
video.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* overlay (light effect) */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.2);
z-index:-1;
}

/* body */
body{
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
z-index:999;
}

/* title */
h1{
text-align:center;
margin-top:20px;
color:#333;
z-index:2;
position:relative;
}

/* container */
.container{
position:relative;
z-index:2;
padding:60px 20px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
max-width:400px;
margin:auto;
}

.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:#000;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(8px);
transition:.3s;
}

.link-button:hover{
transform:scale(1.05);
}

/* 🌻 falling */
.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) translateX(0);}
100%{transform:translateY(110vh) translateX(50px) rotate(360deg);}
}
</style>
</head>

<body>
