<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinc Stickers 🍭</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ✅ smooth scroll */
html{
scroll-behavior:smooth;
}

/* 🎥 video background */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* light overlay */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.25);
z-index:-1;
}

/* body */
body{
font-family:'Segoe UI',sans-serif;
overflow-x:hidden;
overflow-y:auto;
}

/* back */
.back{
position:fixed;
top:10px;
left:10px;
background:#ffffffcc;
padding:8px 12px;
border-radius:10px;
text-decoration:none;
color:#000;
z-index:999;
}

/* title */
h1{
text-align:center;
margin-top:20px;
color:#333;
position:relative;
z-index:2;
}

/* container */
.container{
position:relative;
z-index:2;
padding:60px 20px;
}

/* links */
.links{
display:flex;
flex-direction:column;
gap:12px;
max-width:400px;
margin:auto;
}

/* button */
.link-button{
padding:15px;
border-radius:18px;
text-decoration:none;
color:#000;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(8px);
transition:.3s;
}

.link-button:hover{
transform:scale(1.05);
}

/* 🌻 falling flowers */
.flower{
position:fixed;
top:-20px;
font-size:22px;
pointer-events:none;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(0) translateX(0);}
100%{transform:translateY(110vh) translateX(50px) rotate(360deg);}
}

/* 💥 blast */
.burst{
position:fixed;
font-size:22px;
pointer-events:none;
animation:burst 1s ease-out forwards;
}

@keyframes burst{
0%{
opacity:1;
transform:translate(0,0) scale(1);
}
100%{
opacity:0;
transform:translate(var(--x),var(--y)) scale(0.5);
}
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
<source src="assets/sticker-bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<a href="index.html" class="back">⬅ Back</a>

<h1>🌻 Zinc Stickers 🌻</h1>

</div>

<script>

/* 🌻 falling flowers */
for(let i=0;i<30;i++){
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌻";
f.style.left=Math.random()*100+"vw";
f.style.animationDuration=(5+Math.random()*5)+"s";
f.style.opacity=Math.random();
document.body.appendChild(f);
}

/* 💥 click blast */
document.addEventListener("click",(e)=>{
for(let i=0;i<15;i++){

let p=document.createElement("div");
p.className="burst";
p.innerHTML="🌻";

let x=(Math.random()*300-150)+"px";
let y=(Math.random()*300-150)+"px";

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
p.style.setProperty("--x",x);
p.style.setProperty("--y",y);

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);
}
});

</script>

</body>
</html>
